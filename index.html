<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipart Prompt Creator</title>
  <style>
    :root {
      --bg: #f6f4f1;
      --mint: #bcc8c2;
      --blush: #e6c7bd;
      --mustard: #d8cf8f;
      --coral: #d25a32;
      --charcoal: #5a5a5a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: #3a3a3a;
    }

    .header {
      background: var(--blush);
      padding: 22px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 90px;
      height: 90px;
      background: #aebbb5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }

    .logo img {
      width: 92%;
      height: 92%;
      object-fit: contain;
      display: block;
    }

    .header h1 {
      margin: 0;
      font-size: 32px;
    }

    .header p {
      margin: 6px 0 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .box {
      padding: 22px;
      border-radius: 22px;
    }

    .style { background: var(--mint); }
    .details { background: var(--blush); }
    .line { background: var(--mustard); margin-top: 22px; }

    h2 {
      margin: 0 0 14px;
    }

    .option {
      background: white;
      border-radius: 999px;
      padding: 12px;
      text-align: center;
      margin: 8px 0;
    }

    .field {
      background: rgba(255,255,255,0.45);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      background: white;
      outline: none;
    }

    .field textarea {
      height: 110px;
      resize: none;
    }

    .line-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .buttons {
      text-align: center;
      margin-top: 24px;
    }

    button {
      border: none;
      padding: 12px 22px;
      border-radius: 999px;
      color: white;
      font-weight: bold;
      margin: 6px;
      cursor: pointer;
    }

    .generate { background: var(--coral); }
    .copy { background: #b8a94d; }
    .clear { background: var(--charcoal); }

    .output {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-top: 20px;
    }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .line-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 28px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <img src="./Logo.png" alt="Farm and Pumpkin logo">
    </div>
    <div>
      <h1>Clipart Prompt Creator</h1>
      <p>Create beautiful prompts with a Farm & Pumpkin feel.</p>
    </div>
  </div>

  <div class="container">
    <div class="grid">
      <div class="box style">
        <h2>Style</h2>
        <div class="option">children’s book illustration</div>
        <div class="option">watercolor</div>
        <div class="option">line art</div>
        <div class="option">doodle</div>
        <div class="option">sketch</div>
        <div class="option">logo</div>
      </div>

      <div class="box details">
        <h2>Details</h2>

        <div class="field">
          <label>Subject</label>
          <input placeholder="ducky, pumpkin pie, apple">
        </div>

        <div class="field">
          <label>Extra Details</label>
          <textarea placeholder="add optional details..."></textarea>
        </div>
      </div>
    </div>

    <div class="box line">
      <h2>Line Style</h2>
      <div class="line-grid">
        <div class="option">clean outlines</div>
        <div class="option">bold outlines</div>
        <div class="option">thin lines</div>
        <div class="option">sketchy lines</div>
      </div>
    </div>

    <div class="buttons">
      <button class="generate">Generate Prompt</button>
      <button class="copy">Copy Prompt</button>
      <button class="clear">Clear</button>
    </div>

    <div class="output">Your prompt will appear here...</div>
  </div>

</body>
</html>
