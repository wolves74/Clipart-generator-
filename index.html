<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipart Prompt Creator</title>

<style>
:root {
  --bg: #f6f4f1;
  --mint: #bcc8c2;
  --blush: #e6c7bd;
  --mustard: #d8cf8f;
  --coral: #d25a32;
  --charcoal: #5a5a5a;
  --white: #ffffff;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: #3a3a3a;
}

/* HEADER */
.header {
  background: var(--blush);
  padding: 20px 25px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  width: 80px;
  height: 80px;
  background: var(--mint);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.logo img {
  width: 90%;
  height: 90%;
  object-fit: contain;
}

/* TEXT */
.header h1 {
  margin: 0;
  font-size: 32px;
}

.header p {
  margin: 5px 0 0;
  font-size: 14px;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* BOXES */
.box {
  padding: 20px;
  border-radius: 20px;
}

.style { background: var(--mint); }
.details { background: var(--blush); }
.line { background: var(--mustard); }

h2 {
  margin-top: 0;
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: none;
  background: #f8f8f8;
}

textarea {
  height: 120px;
}

/* OPTIONS */
.option {
  background: white;
  border-radius: 999px;
  padding: 12px;
  text-align: center;
  margin: 8px 0;
  cursor: pointer;
}

.option.active {
  background: var(--charcoal);
  color: white;
}

/* LINE GRID */
.line-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

/* BUTTONS */
.buttons {
  text-align: center;
  margin-top: 20px;
}

button {
  border: none;
  padding: 12px 20px;
  border-radius: 999px;
  color: white;
  font-weight: bold;
  margin: 5px;
}

.generate { background: var(--coral); }
.copy { background: #b8a94d; }
.clear { background: var(--charcoal); }

/* OUTPUT */
.output {
  background: white;
  border-radius: 15px;
  padding: 15px;
  margin-top: 20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <!-- ✅ FIXED HERE -->
    <img src="./Logo.png">
  </div>

  <div>
    <h1>Clipart Prompt Creator</h1>
    <p>Create beautiful prompts with a Farm & Pumpkin feel.</p>
  </div>
</div>

<div class="container">

<div class="grid">

<div class="box style">
<h2>Style</h2>
<div class="option">children’s book illustration</div>
<div class="option">watercolor</div>
<div class="option">line art</div>
<div class="option">doodle</div>
<div class="option">sketch</div>
<div class="option">logo</div>
</div>

<div class="box details">
<h2>Details</h2>

<label>Subject</label>
<input placeholder="ducky, pumpkin pie, apple">

<label>Extra Details</label>
<textarea placeholder="optional details..."></textarea>

</div>

</div>

<div class="box line">
<h2>Line Style</h2>

<div class="line-grid">
<div class="option">clean outlines</div>
<div class="option">bold outlines</div>
<div class="option">thin lines</div>
<div class="option">sketchy lines</div>
</div>

</div>

<div class="buttons">
<button class="generate">Generate Prompt</button>
<button class="copy">Copy Prompt</button>
<button class="clear">Clear</button>
</div>

<div class="output">
Your prompt will appear here...
</div>

</div>

</body>
</html>
