<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clipart Prompt Creator</title>

<style>
:root {
  --bg: #f6f4f1;
  --mint: #bcc8c2;
  --blush: #e6c7bd;
  --mustard: #d8cf8f;
  --coral: #d25a32;
  --charcoal: #5a5a5a;
  --soft-field: #f2f2f2;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: #3a3a3a;
}

/* HEADER */
.header {
  background: var(--blush);
  padding: 22px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
}

/* LOGO */
.logo {
  width: 90px;
  height: 90px;
  background: #aebbb5;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.logo img {
  width: 92%;
  height: 92%;
  object-fit: contain;
  background: white;
  border-radius: 50%;
  padding: 6px;
}

/* TEXT */
.header h1 {
  margin: 0;
  font-size: 32px;
}

.header p {
  margin: 6px 0 0;
  font-size: 14px;
  opacity: 0.8;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 22px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
}

/* BOXES */
.box {
  padding: 22px;
  border-radius: 22px;
}

.style { background: var(--mint); }
.details { background: var(--blush); }
.line { background: var(--mustard); margin-top: 22px; }

h2 {
  margin: 0 0 14px;
}

  padding: 14px;
  border-radius: 16px;
  margin-bottom: 14px;
}
