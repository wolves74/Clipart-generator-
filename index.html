<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clipart Prompt Generator</title>
  <style>
    :root {
      --bg: #f3f3f1;
      --panel: #fbfbfa;
      --text: #8a8a8a;
      --text-dark: #6f6f6f;
      --border: #d7d7d7;
      --shadow: 0 1px 0 rgba(0,0,0,0.02);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Georgia", "Times New Roman", serif;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 28px 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 26px;
      align-items: start;
      margin-bottom: 26px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 170px;
    }

    .logo-wrap img {
      max-width: 150px;
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .hero-copy {
      text-align: center;
      padding-top: 6px;
    }

    .title {
      margin: 0;
      color: var(--text-dark);
      font-size: clamp(42px, 6vw, 74px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 28px auto 0;
      max-width: 860px;
      font-size: 18px;
      line-height: 1.45;
      letter-spacing: 0.16em;
      color: var(--text);
    }

    .top-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 28px;
      margin-top: 28px;
      align-items: start;
    }

    .dropdown-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .dropdown-toggle,
    .panel,
    .details-label,
    .details-input,
    .action-btn,
    .prompt-box {
      background: var(--panel);
      border: 1px solid rgba(0,0,0,0.02
